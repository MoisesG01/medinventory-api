apiVersion: v1
kind: ConfigMap
metadata:
  name: ama-metrics-prometheus-config
  namespace: kube-system
data:
  prometheus-config: |-
    scrape_configs:
      - job_name: "medinventory-api"
        metrics_path: /metrics
        scheme: http
        static_configs:
          # Scrape the Service VIP (port 80) which forwards to the pods' 8080.
          - targets: ["medinventory-api.medinventory.svc.cluster.local:80"]
        metric_relabel_configs:
          # Optional: reduce cardinality from Prometheus internal labels if any appear
          - source_labels: [__name__]
            action: keep
            regex: "http_requests_total|process_.*|nodejs_.*|nestjs_.*|up"

